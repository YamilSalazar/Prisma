{% extends "core/base.html" %}

{% block content %}
<section class="filters-bar filters-bar--map">
  <select class="select"><option>Hospedaje: todos</option><option>Caba&ntilde;a</option><option>Camping</option></select>
  <select class="select"><option>Capacidad: todas</option><option>Hasta 2 pers</option><option>Hasta 4 pers</option></select>
  <select class="select"><option>Precio: cualquiera</option><option>Hasta $800</option><option>$800 &mdash; $1,400</option></select>
  <span class="filters-bar__count">{{ parks|length }} visibles en el mapa</span>
</section>

<section class="map-frame map-frame--interactive">
  <div class="map-grid map-grid--interactive" style="padding: 0; background: none;">
    {{ map_html|safe }}
  </div>
</section>
{% endblock %}
