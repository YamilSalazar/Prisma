{% extends "core/base.html" %}
{% block content %}
<section class="centered-panel">
  <div class="card form-card form-card--auth" style="text-align:center; padding:36px 36px 32px;">
    <i class="ph ph-envelope" style="font-size:40px; color:var(--gold); display:block; margin-bottom:16px;" aria-hidden="true"></i>
    <h1 style="margin:0 0 12px; font-size:24px;">Correo enviado</h1>
    <p class="auth-copy">Te mandamos un enlace para restablecer la contrase&ntilde;a a <strong>tucorreo@ejemplo.com</strong>.</p>
    <p style="color:var(--muted); font-size:12.5px; margin:0 0 28px; line-height:1.6;">Revisa tambi&eacute;n la carpeta de spam. El enlace caduca en 30 minutos.</p>
    <button class="button button--secondary button--block" type="button">Reenviar enlace</button>
    <p class="form-note" style="margin-top:22px;"><a href="{% url 'core:login' %}"><i class="ph ph-arrow-left"></i> Volver a iniciar sesi&oacute;n</a></p>
  </div>
</section>
{% endblock %}
