{% load static %}
<header class="nav">
  <a class="nav__brand" href="{% url 'core:home' %}" aria-label="Inicio">
    <img src="{% static 'core/assets/logo-fila.png' %}" alt="Festival Internacional de las Luciérnagas">
  </a>

  <nav class="nav__links" aria-label="Principal">
    <a class="nav__link {% if active == 'home' %}is-active{% endif %}" href="{% url 'core:home' %}">Inicio</a>
    <a class="nav__link {% if active == 'map' %}is-active{% endif %}" href="{% url 'core:map' %}">Mapa</a>
    <a class="nav__link {% if active == 'park_list' %}is-active{% endif %}" href="{% url 'core:park_list' %}">Lista</a>
  </nav>

  <div class="nav__spacer"></div>

  <div class="language-switch" aria-label="Idioma">
    <strong>ES</strong>
    <span>/</span>
    <span>EN</span>
  </div>

  {% if request.user.is_authenticated %}
    <a class="nav__link nav__link--account {% if active == 'reservations' %}is-active{% endif %}" href="{% url 'core:reservations' %}">Mis reservaciones</a>
    <a class="nav__link nav__link--account {% if active == 'account' %}is-active{% endif %}" href="{% url 'core:account' %}">Mi cuenta</a>
    <a class="button button--secondary" href="{% url 'core:logout' %}">Cerrar sesión</a>
  {% else %}
    <a class="button button--secondary" href="{% url 'core:login' %}">Iniciar sesión</a>
    <a class="button button--primary" href="{% url 'core:register' %}">Registrarse</a>
  {% endif %}
</header>
