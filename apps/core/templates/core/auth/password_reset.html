{% extends "core/base.html" %}

{% block content %}
<section class="centered-panel">
  <form class="card form-card form-card--auth form-card--reset" method="get" action="{% url 'core:password_reset_sent' %}">
    <p class="eyebrow">Acceso</p>
    <h1>Recuperar contrase&ntilde;a</h1>
    <p class="auth-copy">Introduce tu correo y te enviaremos un enlace para restablecer la contrase&ntilde;a. El enlace caduca en 30 minutos.</p>

    <label class="field auth-field">Correo electr&oacute;nico
      <span class="auth-input">
        <i class="ph ph-envelope-simple" aria-hidden="true"></i>
        <input type="email" placeholder="tucorreo@ejemplo.com">
      </span>
    </label>

    <button class="button button--primary button--block" type="submit">Enviar enlace</button>
    <p class="form-note"><a href="{% url 'core:login' %}">&larr; Volver a iniciar sesi&oacute;n</a></p>
  </form>
</section>
{% endblock %}
