{% extends "core/base.html" %}
{% block content %}
<section class="centered-panel">
  <form class="card form-card form-card--auth">
    <p class="eyebrow">Acceso</p>
    <h1>Nueva contrase&ntilde;a</h1>

    <label class="field auth-field">Contrase&ntilde;a nueva
      <span class="auth-input auth-input--password">
        <input id="new-password" type="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;">
        <button type="button" data-toggle-password="#new-password" aria-label="Mostrar contrase&ntilde;a">
          <i class="ph ph-eye" aria-hidden="true"></i>
        </button>
      </span>
      <small>M&iacute;nimo 8 caracteres, una may&uacute;scula y un n&uacute;mero</small>
    </label>

    <label class="field auth-field">Confirmar contrase&ntilde;a
      <span class="auth-input auth-input--password">
        <input id="confirm-password" type="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;">
        <button type="button" data-toggle-password="#confirm-password" aria-label="Mostrar contrase&ntilde;a">
          <i class="ph ph-eye" aria-hidden="true"></i>
        </button>
      </span>
    </label>

    <button class="button button--primary button--block" type="button">Guardar contrase&ntilde;a</button>
  </form>
</section>
{% endblock %}
