    <main class="admin-main">
      <a class="back-link" href="{% url 'core:admin_parques' %}"><i class="ph ph-arrow-left"></i> Volver al listado de parques</a>

      <div class="admin-page-header">
        <div>
          <p class="eyebrow">Parques</p>
          <h1>Agregar parque</h1>
        </div>
      </div>

      <form class="card" method="post" action="{% url 'core:admin_agregar_parque' %}">
        {% csrf_token %}
        <h3 class="form-section-title">Información general</h3>

        <div class="field-group">
          <div class="field">
            <label>Nombre del parque</label>
            <input type="text" name="nombre" placeholder="Ej. Santuario Torre Alta" required>
          </div>
        </div>

        <div class="field-group">
          <div class="field">
            <label>Dirección</label>
            <input type="text" name="direccion" placeholder="Calle, número, municipio, estado">
          </div>
        </div>

        <div class="field-group field-group--2">
          <div class="field">
            <label>Tipo de hospedaje</label>
            <select name="tipo">
              <option value="Cabaña">Cabaña</option>
              <option value="Camping">Camping</option>
            </select>
          </div>
          <div class="field">
            <label>Precio por noche (MXN)</label>
            <input type="number" name="precio" placeholder="Ej. 1200" min="0">
          </div>
        </div>

        <hr class="divider">
        <h3 class="form-section-title">Servicios disponibles</h3>
        <p style="margin:0 0 14px;color:var(--muted);font-size:13px">Selecciona todos los que aplican.</p>

        <div class="checkbox-grid" style="margin-bottom:24px">
          <label class="checkbox-item"><input type="checkbox" name="amenidades" value="Estacionamiento" checked> Estacionamiento</label>
          <label class="checkbox-item"><input type="checkbox" name="amenidades" value="Baños comunes"> Sanitarios</label>
          <label class="checkbox-item"><input type="checkbox" name="amenidades" value="Chimenea"> Chimenea</label>
          <label class="checkbox-item"><input type="checkbox" name="amenidades" value="Baño privado"> Baño privado</label>
          <label class="checkbox-item"><input type="checkbox" name="amenidades" value="Fogata"> Fogatas</label>
          <label class="checkbox-item"><input type="checkbox" name="amenidades" value="Guía certificado"> Guía de campo</label>
          <label class="checkbox-item"><input type="checkbox" name="amenidades" value="Restaurante"> Comedor / Kiosco</label>
          <label class="checkbox-item"><input type="checkbox" name="amenidades" value="Vista panorámica"> Vista panorámica</label>
          <label class="checkbox-item"><input type="checkbox" name="amenidades" value="Desayuno"> Desayuno</label>
        </div>

        <hr class="divider">
        <h3 class="form-section-title">Capacidad</h3>

        <div class="field-group field-group--3">
          <div class="field">
            <label>Personas por hospedaje</label>
            <input type="number" name="capacidad_personas" value="4" min="1">
          </div>
          <div class="field">
            <label>Lugares individuales (cab.)</label>
            <input type="number" name="capacidad_cabanas" placeholder="0" min="0">
          </div>
          <div class="field">
            <label>Zonas de camping (tiendas)</label>
            <input type="number" name="capacidad_camping" placeholder="0" min="0">
          </div>
        </div>

        <label class="checkbox-item" style="margin-bottom:8px"><input type="checkbox" name="activo" checked> Parque activo (visible al público)</label>

        <div class="form-actions">
          <a class="button button--secondary" href="{% url 'core:admin_parques' %}">Cancelar</a>
          <button class="button button--primary" type="submit"><i class="ph ph-floppy-disk"></i> Guardar parque</button>
        </div>
      </form>
    </main>
