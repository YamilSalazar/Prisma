{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="{% static 'core/css/festival.css' %}">
</head>
<body>
  <div class="site-shell">
    {% include "core/partials/navbar.html" %}
    <main class="site-main {% if full_bleed %}site-main--flush{% endif %}">
      {% block content %}{% endblock %}
    </main>
    {% if not hide_footer %}
      {% include "core/partials/footer.html" %}
    {% endif %}
  </div>
  <script src="{% static 'core/js/festival.js' %}"></script>
</body>
</html>
